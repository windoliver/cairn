name: governance

# Uses `pull_request_target` so the job runs in the trusted base-branch
# context, not the PR's workspace. The checkout step ALWAYS checks out the
# PR's base ref; the PR head is fetched only as a bare SHA for diffing,
# never checked out or executed.
#
# SECURITY: this workflow must not execute any file contributed by the PR.
# It runs only `scripts/check-freeze.sh` from the base ref, installed on
# `main` first.

on:
  pull_request_target:
    branches: [main]
    types:
      - opened
      - synchronize
      - reopened
      - edited
      - ready_for_review
      - labeled
      - unlabeled

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: governance-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  freeze-check:
    name: freeze / active path freezes
    if: github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Check out BASE ref (trusted)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0

      - name: Install PyYAML (hash-pinned)
        # Hash-pinned because this workflow runs in the trusted base context
        # with secrets.GITHUB_TOKEN; an unpinned PyPI install would let a
        # supply-chain compromise of pyyaml execute pre-gate. The hashes
        # are the upstream SHA256 from PyPI for pyyaml 6.0.2 — see
        # .github/requirements/governance.txt.
        run: |
          python3 -m pip install --quiet --disable-pip-version-check \
            --require-hashes --only-binary=:all: \
            --no-deps -r .github/requirements/governance.txt

      - name: Fetch PR head SHA (metadata only)
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=200 origin \
            "+${{ github.event.pull_request.head.sha }}:refs/pr-head"

      - name: Enforce active freezes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: bash scripts/check-freeze.sh
