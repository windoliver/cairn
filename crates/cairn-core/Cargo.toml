[package]
name = "cairn-core"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
readme.workspace = true
description = "Cairn verb layer, domain types, and error enums. No I/O, no adapters."

[features]
default = []
# Re-exports the in-tree `sample_record` factory under
# `cairn_core::domain::record::tests_export` so adapter crates can build the
# same canonical fixture from `[dev-dependencies]`. Never enable in
# production builds.
test-fixtures = []

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
async-trait = { workspace = true }
blake3 = { workspace = true }
toml = { workspace = true }
sha2 = { workspace = true }

[dev-dependencies]
async-trait = { workspace = true }
proptest = { workspace = true }
insta = { workspace = true }
rusqlite = { workspace = true }

[lints]
workspace = true
