[package]
name = "cairn-core"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
readme.workspace = true
description = "Cairn verb layer, domain types, and error enums. No I/O, no adapters."

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
async-trait = { workspace = true }
toml = { workspace = true }
sha2 = { workspace = true }

[dev-dependencies]
async-trait = { workspace = true }
criterion = { workspace = true }
proptest = { workspace = true }
insta = { workspace = true }
rusqlite = { workspace = true }

[features]
# Exposes unstable APIs needed by benches and out-of-crate dev consumers
# while #218 (TerminalContext binding) is open. Not enabled by default;
# never depend on this feature in non-dev builds.
internal-unstable = []

[lints]
workspace = true

[[bench]]
name = "squash"
harness = false
required-features = ["internal-unstable"]
