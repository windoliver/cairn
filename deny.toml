# cargo-deny policy for Cairn. Wired into the `supply-chain` workflow
# (.github/workflows/supply-chain.yml). Local equivalent: `cargo deny check`.

[licenses]
allow = [
    "Apache-2.0",
    "MIT",
    # MIT-0 = MIT without the attribution clause (strictly more permissive).
    # Pulled in transitively via referencing → fluent-uri → borrow-or-share
    # (jsonschema 0.46 dependency for cross-file $ref resolution in
    # cairn-idl skill-compat).
    "MIT-0",
    "BSD-3-Clause",
    "BSD-2-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "CC0-1.0",
    "Zlib",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"

[advisories]
yanked = "deny"

# Deny-by-default for dependency sources. Without this, the
# `cargo-deny check sources` step in supply-chain.yml only warns on
# unknown git or registry sources — a PR could add an arbitrary git
# dependency and still pass the required gate.
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
